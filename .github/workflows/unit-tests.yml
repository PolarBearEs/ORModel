name: Run Python Tests

# Controls when the workflow will run
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Add permissions for OIDC token for Codecov
permissions:
  contents: read
  id-token: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "test"
  test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Define strategy for multiple Python versions
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python environment
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Step 3: Install uv and project dependencies
      - name: Install uv and Dependencies
        run: |
          pip install uv
          uv pip install --system --no-cache -e ".[dev]"

      - name: Run lint with Ruff
        run: |
          ruff check .

      - name: Run type checks with mypy
        run: |
          mypy ormodel

      # Step 5: Run tests with coverage
      # We run coverage for all versions but only upload once (optional)
      # Or just run coverage for the primary version to save time
      - name: Run tests with pytest
        run: |
          if [ "${{ matrix.python-version }}" == "3.11" ]; then
            pytest -v --cov=ormodel --cov-branch --cov-report=xml tests/
          else
            pytest -v tests/
          fi

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          use_oidc: true
          files: ./coverage.xml
          fail_ci_if_error: true
